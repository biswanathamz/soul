name: echo
description: >
  Echo back the given text. A reference skill that returns whatever it is
  given — use it to confirm the skill loop works end to end.
version: 0.1
type: script
entrypoint: run.py
timeout_seconds: 5
parameters:                    # JSON-Schema — becomes the model-facing tool schema
  type: object
  properties:
    text: { type: string, description: "The text to echo back" }
  required: [text]
permissions:                   # least-privilege; the runtime enforces these
  network: false
  filesystem: none             # none | workspace | readonly-workspace
example:                       # used by pooltest.py to smoke-run the skill
  input: { text: "hello SOUL" }

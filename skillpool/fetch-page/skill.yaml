name: fetch-page
description: >
  Fetch a web page and return its readable text (title, URL, main content).
  Use after web-search to actually read a promising result before answering —
  a snippet alone is not evidence. Long pages are truncated.
version: 0.1
type: script
entrypoint: run.py
timeout_seconds: 20
parameters:
  type: object
  properties:
    url:
      type: string
      description: "The http(s) URL to read, exactly as returned by web-search"
    max_chars:
      type: integer
      description: "Truncate the text at this many characters (default 6000, max 20000)"
  required: [url]
permissions:
  network: true
  filesystem: none
example:
  input: { url: "https://nodejs.org/en/about/previous-releases" }
  offline: true                # smoke-test against a canned page; pooltest --live really fetches

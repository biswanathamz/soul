# Build + test the soul-orchestrator (Spring Boot) on changes.
name: verify-orchestrator

on:
  pull_request:
    paths:
      - "soul-orchestrator/**"
      - "skillpool/**"      # registry tests load the real pools
      - "hookspool/**"
      - ".github/workflows/verify-orchestrator.yml"
  push:
    branches: [master]
    paths:
      - "soul-orchestrator/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Test
        working-directory: soul-orchestrator
        run: ./gradlew test --no-daemon

# SOUL — Ollama model manifest.
#
# Single source of truth for which models SOUL needs. `manage.py sync` makes a
# running Ollama match this file; `manage.py verify` checks the orchestrator's
# agent bindings stay a subset of it.
#
# Rules:
#   - Pinned tags only (llama3.1:8b, not llama3.1) — ":latest" drift is how two
#     machines end up behaving differently.
#   - `roles` ties each model to a SPEC §3.2 agent role. [] = optional spare.
#   - `prune` only removes models NOT listed here — this file is a whitelist.

defaults:
  keep_alive: 30m

# On a 4 GB card only one model fits in VRAM at a time, so the Manager and the
# Researcher share one — a 3B model that fits ENTIRELY on the GPU. llama3.1:8b needs
# ~5.6 GB and was running 50% on the CPU (see docs/bug/latency-and-tts-interruption.md),
# which is what made a single answer take minutes. It stays here as an optional spare
# (roles: [], not required) so it isn't pruned and you can rebind to it on a bigger GPU.
models:
  - name: llama3.2:3b
    roles: [super, researcher]   # Manager + first worker; fits 4 GB → 100% GPU
    required: true
    warm: true            # preload into RAM so the first message isn't a cold load

  - name: llama3.1:8b
    roles: []             # spare — kept for GPUs with the VRAM to run it fully
    required: false
    warm: false

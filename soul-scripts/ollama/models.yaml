# SOUL — Ollama model manifest.
#
# Single source of truth for which models SOUL needs. `manage.py sync` makes a
# running Ollama match this file; `manage.py verify` checks the orchestrator's
# agent bindings stay a subset of it.
#
# Rules:
#   - Pinned tags only (llama3.1:8b, not llama3.1) — ":latest" drift is how two
#     machines end up behaving differently.
#   - `roles` ties each model to a SPEC §3.2 agent role. [] = optional spare.
#   - `prune` only removes models NOT listed here — this file is a whitelist.

defaults:
  keep_alive: 30m

# Manager-agent phase: only the Super Agent ("SOUL") model is provisioned.
# Sub-agent models (coder/researcher/writer/analyst/sysops) get added back here
# as each of those agents is built. See docs/manager-agent.md.
models:
  - name: llama3.1:8b
    roles: [super]        # the Manager — plans, delegates, runs skills/hooks
    required: true
    warm: true            # preload into RAM so the first message isn't a cold load

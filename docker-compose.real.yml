# Real-stack override: swaps the mock soul-orchestrator for the Spring Boot Manager
# and wires it to Ollama. Use with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.real.yml up -d \
#       soul-ollama soul-orchestrator soul-console
# (or `make up-real`). Needs a pulled model — run `make models-sync` first.
services:
  soul-orchestrator:
    build:
      context: .
      dockerfile: soul-orchestrator/Dockerfile
    environment:
      OLLAMA_HOST: http://soul-ollama:11434
    # No depends_on soul-ollama here: it lives in the `ollama` profile, and
    # `make up-real` starts services by name in order. The Manager also tolerates
    # Ollama being unreachable (surfaces an error event rather than crashing).

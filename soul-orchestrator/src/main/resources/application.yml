soul:
  ollama:
    base-url: ${OLLAMA_HOST:http://localhost:11434}
    request-timeout-seconds: 120
    # Keep the model resident between turns. Without this each chat request lets Ollama
    # fall back to its 5-minute default, so an idle spell unloads the model and the next
    # question pays a full cold reload (docs/bug/latency-and-tts-interruption.md).
    keep-alive: 30m
  web:
    cors-allowed-origin: http://localhost:7787

  pools:                          # loaded once, shared by every agent
    skills: { path: ../skillpool, enabled: true }
    hooks:  { path: ../hookspool, enabled: true, default-timeout-seconds: 5 }

  delegation:                     # generic — applies to any worker (docs/researcher-agent.md §5.1)
    # Measured on the reference box (llama3.1:8b, 4 GB VRAM): a full research loop —
    # search, read two independent sources, compose — runs ~150 s, because every model
    # call costs 20–40 s. 120 s cut it off mid-flight and turned good research into an
    # honest "I couldn't find out". Tune down on faster hardware; the user is never stuck
    # waiting regardless, since ⏹ stop cancels at the next step boundary.
    timeout-seconds: 240          # a timed-out worker is sent a cancel, not just abandoned
    confidence:
      retry-below: 0.4            # below this → try again with different sources
      hedge-below: 0.7            # below this → answer with explicit uncertainty
      max-retries: 1              # latency honesty: each retry is a full worker loop

  research:                       # researcher-specific knobs (§4.2)
    max-sources: 4
    # One opened source instead of two: on the 4 GB box a second fetch+summarize turn adds
    # ~40 s, and a lone source is already capped at ≤0.6 confidence and hedged. See docs/bug/.
    min-sources: 1
    search:                       # the SearchConnector layer (§4.3) — providers are pluggable
      provider: ${SOUL_SEARCH_PROVIDER:duckduckgo}    # zero-setup default: no key, no account
      fallbacks: ${SOUL_SEARCH_FALLBACKS:}            # e.g. "searxng,brave" — tried in order

  agents:
    super:                        # the Manager — the only agent the user talks to
      model: llama3.2:3b          # fits 4 GB VRAM entirely → 100% GPU (see docs/bug/…)
      persona: jarvis
      max-steps: 6
      skills: [echo, current-time, persona]
      hooks:  [audit-log, block-secrets, inject-time]
      # No worker list here: the Manager delegates by capability, never by name.

    researcher:                   # the first worker agent
      model: llama3.2:3b          # same model as the Manager = no VRAM swap on 4 GB
      persona: researcher
      max-steps: 8
      description: >-
        finds current, real-world information on the web: news, prices, releases,
        weather, scores. Use for anything after your training data.
      capabilities: [research.search, research.fetch]   # PUBLIC contract → the registry
      skills: [web-search, fetch-page, researcher-persona, current-time]  # private toolbox
      hooks:  [audit-log]         # block-secrets joins automatically via always-apply

server:
  port: 7788
